name: Daily Job Scan

on:
  schedule:
    # Runs daily at 06:00 UTC (08:00 CET)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scan
        run: node scan-and-build.mjs

      - name: Commit and push
        run: |
          git config user.name "Smart Intel Bot"
          git config user.email "bot@smart-intel.local"
          git add index.html data/
          git diff --staged --quiet || git commit -m "Daily scan: $(date +%Y-%m-%d)"
          git push
