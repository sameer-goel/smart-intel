<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Intel — AI-Powered Intelligence Feed</title>
<meta name="description" content="Auto-generated tech intelligence by Scout AI.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:#08090a;color:#9ca3af}
a{color:inherit;text-decoration:none}

/* Compact header */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid #16181d;background:#0c0d10;position:sticky;top:0;z-index:10}
.header .brand{display:flex;align-items:center;gap:10px}
.header .brand h1{font-size:1.15em;font-weight:700;color:#f1f3f5}
.header .live{display:flex;align-items:center;gap:5px;font-size:.72em;color:#4ade80}
.header .live .dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
.header .links{display:flex;gap:16px;font-size:.82em;color:#4b5563}
.header .links a:hover{color:#60a5fa}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Section */
.section{max-width:1100px;margin:0 auto;padding:24px 24px 0}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-head .icon{font-size:1.3em}
.section-head h2{font-size:1em;font-weight:700;color:#e5e7eb}
.section-head .badge{font-size:.7em;padding:2px 8px;border-radius:4px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.badge.ai{background:rgba(96,165,250,.1);color:#60a5fa}
.badge.tech{background:rgba(45,212,191,.1);color:#2dd4bf}
.badge.biz{background:rgba(251,191,36,.1);color:#fbbf24}
.badge.geo{background:rgba(167,139,250,.1);color:#a78bfa}
.badge.cloud{background:rgba(96,165,250,.1);color:#60a5fa}
.badge.sec{background:rgba(248,113,113,.1);color:#f87171}

/* Insight tiles */
.insights{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
.insight{background:#0c0d10;border:1px solid #16181d;border-radius:8px;padding:16px;position:relative;transition:border-color .15s;cursor:pointer;text-decoration:none;display:block}
.insight:hover{border-color:#2a2d36;background:#0e1014}
.insight .source{font-size:.7em;color:#4b5563;margin-top:8px;display:flex;align-items:center;gap:4px}
.insight:hover .source{color:#60a5fa}
.insight .num{position:absolute;top:12px;right:14px;font-size:.7em;font-weight:700;color:#2a2d36}
.insight .headline{font-size:.88em;font-weight:600;color:#d1d5db;line-height:1.45;margin-bottom:6px}
.insight .detail{font-size:.78em;color:#6b7280;line-height:1.5}
.insight .detail strong{color:#9ca3af}

/* Divider */
.divider{border:none;border-top:1px solid #111;margin:24px auto 0;max-width:1100px}

/* Report tiles below */
.reports-section{max-width:1100px;margin:0 auto;padding:24px}
.reports-section h2{font-size:1em;font-weight:700;color:#e5e7eb;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.reports{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.tile{background:#0c0d10;border:1px solid #16181d;border-radius:8px;padding:18px;display:flex;flex-direction:column;transition:all .15s;position:relative;overflow:hidden}
.tile:hover{border-color:#2a2d36;transform:translateY(-1px)}
.tile .accent{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#60a5fa,#a78bfa);opacity:0;transition:opacity .15s}
.tile:hover .accent{opacity:1}
.tile .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tile .date{font-size:.72em;color:#4b5563}
.tile .tags{display:flex;gap:3px}
.tile .tag{font-size:.6em;padding:2px 6px;border-radius:3px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.tile h3{font-size:.92em;font-weight:600;color:#d1d5db;margin-bottom:6px;line-height:1.4}
.tile:hover h3{color:#f1f3f5}
.tile .excerpt{font-size:.78em;color:#6b7280;line-height:1.5;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tile .read{font-size:.75em;color:#60a5fa;margin-top:10px;font-weight:500}

.footer{text-align:center;padding:24px;border-top:1px solid #111;margin-top:16px;font-size:.75em;color:#374151}
.footer a{color:#4b5563}.footer a:hover{color:#60a5fa}

@media(max-width:768px){
  .insights{grid-template-columns:1fr}
  .reports{grid-template-columns:1fr}
  .header{flex-direction:column;gap:8px;align-items:flex-start}
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <h1>🔭 Smart Intel</h1>
    <span class="live"><span class="dot"></span>Live</span>
  </div>
  <div class="links">
    <a href="https://nl.linkedin.com/in/sameer-goel">LinkedIn</a>
    <a href="https://github.com/sameer-goel/smart-intel">GitHub</a>
  </div>
</div>

<!-- Dynamic insights loaded from insights.json -->
<div id="insightsContainer"></div>

<hr class="divider">

<!-- FULL REPORTS -->
<div class="reports-section">
  <h2>📄 Full Reports</h2>
  <div class="reports" id="feed"></div>
</div>

<div class="footer">
  <a href="https://nl.linkedin.com/in/sameer-goel">Sameer Goel</a> · Powered by <a href="https://github.com/sameer-goel/smart-intel">Scout 🔭</a> · Updated nightly
</div>

<script>
const tagColors={ai:'ai',tech:'tech',business:'biz',geopolitics:'geo',cloud:'cloud',security:'sec'};
const badgeMap={ai:'ai',tech:'tech',business:'biz',geopolitics:'geo',cloud:'cloud',security:'sec'};

// Load insights
async function loadInsights(){
  const c=document.getElementById('insightsContainer');
  try{
    const r=await fetch('./intel/insights.json');
    const d=await r.json();
    let html='';
    const order=['ai','tech','business','geopolitics','cloud','security'];
    for(const key of order){
      const cat=d.categories[key];
      if(!cat)continue;
      html+=`<div class="section"><div class="section-head"><span class="icon">${cat.icon}</span><h2>${cat.label}</h2><span class="badge ${badgeMap[key]||'ai'}">TOP 3</span></div><div class="insights">`;
      (cat.insights||[]).forEach((ins,i)=>{
        const domain=ins.url?new URL(ins.url).hostname.replace('www.',''):'';
        const tag=ins.url?`<a class="insight" href="${ins.url}" target="_blank" rel="noopener">`:`<div class="insight">`;
        const end=ins.url?`</a>`:`</div>`;
        html+=`${tag}<span class="num">#${i+1}</span><div class="headline">${ins.headline}</div><div class="detail">${ins.detail}</div>${domain?`<div class="source">↗ ${domain}</div>`:''}${end}`;
      });
      html+=`</div></div><hr class="divider">`;
    }
    c.innerHTML=html;
  }catch(e){c.innerHTML=''}
}

async function loadFeed(){
  const feed=document.getElementById('feed');
  try{
    const r=await fetch('./intel/index.json');
    const d=await r.json();
    if(!d.articles||!d.articles.length){feed.innerHTML='<p style="color:#4b5563;padding:20px">No reports yet.</p>';return}
    feed.innerHTML=d.articles.map(a=>`
      <a class="tile" href="./intel/${a.slug}.html">
        <div class="accent"></div>
        <div class="top">
          <span class="date">${a.date}</span>
          <div class="tags">${(a.tags||[]).slice(0,3).map(t=>`<span class="tag badge ${tagColors[t]||'ai'}">${t}</span>`).join('')}</div>
        </div>
        <h3>${a.title}</h3>
        <p class="excerpt">${a.excerpt}</p>
        <span class="read">Read full report →</span>
      </a>
    `).join('');
  }catch(e){feed.innerHTML='<p style="color:#4b5563;padding:20px">Loading...</p>'}
}
loadInsights();
loadFeed();
</script>
</body>
</html>
